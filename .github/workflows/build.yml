name: Build Artifact

on:
  workflow_call:
    #workflow_run:
    #   workflows: ["Run Tests"]
    #   types:
    #    - completed

jobs:
    test:
        runs-on: ubuntu-latest
        
        steps:
            - uses: actions/checkout@v6


            - name: Create Artifact
              run: |
                zip -r app.zip .

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                name: python-app
                path: app.zip                